<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Check-In | Vadrózsa</title>
    <style>
        :root {
            --primary: #1e3f20; /* Deep Golf Green */
            --background: #f4f7f5;
            --text: #2d3748;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { color: var(--primary); margin-bottom: 8px; text-align: center; font-size: 24px; }
        p.subtitle { text-align: center; font-size: 14px; color: #718096; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 16px; transition: border 0.2s; }
        input:focus { outline: none; border-color: var(--primary); }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #142b16; }
        .success-msg { display: none; text-align: center; padding: 20px 0; }
        .success-msg h3 { color: var(--primary); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="form-container">
        <h2>Vadrózsa Golf Club</h2>
        <p class="subtitle">Please check in before heading to the 1st tee</p>
        
        <form id="checkinForm" onsubmit="handleCheckin(event)">
            <div class="form-group">
                <label for="firstName">First Name *</label>
                <input type="text" id="firstName" required autocomplete="given-name">
            </div>
            <div class="form-group">
                <label for="lastName">Last Name *</label>
                <input type="text" id="lastName" required autocomplete="family-name">
            </div>
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" required autocomplete="tel">
            </div>
            
            <!-- Date and 24h Time Fields side by side -->
            <div class="row">
                <div class="form-group">
                    <label for="playDate">Date of Play *</label>
                    <input type="date" id="playDate" required>
                </div>
                <div class="form-group">
                    <label for="startTime">Start Time (24h) *</label>
                    <input type="time" id="startTime" required>
                </div>
            </div>
            
            <button type="submit">Confirm Arrival & Play</button>
        </form>
    </div>

    <div id="success-container" class="success-msg">
        <h3>✓ Check-In Confirmed</h3>
        <p>Thank you! Your arrival has been logged. Have a great round!</p>
    </div>
</div>

<script>
    // Get current local date and time
    const now = new Date();
    
    // Format and set current date (YYYY-MM-DD)
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    document.getElementById('playDate').value = `${year}-${month}-${day}`;

    // Format and set current time explicitly to 24-hour format (HH:MM)
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('startTime').value = `${hours}:${minutes}`;

    function handleCheckin(event) {
        event.preventDefault();
        
        const data = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            playDate: document.getElementById('playDate').value,
            startTime: document.getElementById('startTime').value
        };

        console.log("Player checked in successfully:", data);

        document.getElementById('form-container').style.display = 'none';
        document.getElementById('success-container').style.display = 'block';
    }
</script>
</body>
</html>
